<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebSocket Chat</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <!-- Username modal — shown first -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h2>Enter your name to enter the chat room</h2>
            <input type="text" id="usernameInput" placeholder="Your name..." autocomplete="off" />
            <button id="joinButton">Join Chat</button>
        </div>
    </div>

    <!-- Chat — hidden until name is submitted -->
    <div class="app-container" id="appContainer" style="display: none;">
        <div class="chat-container" id="chatContainer" >
            <div class="chat-header">Chat Room</div>
            <div class="messages-container" id="messagesContainer"></div>
            <div class="input-area">
                <input type="text" id="messageInput" placeholder="Type a message..." autocomplete="off">
                <button id="sendButton">Send</button>
            </div>
        </div>

        <div class="sidebar">
            <div class="sidebar-header">Online</div>
            <ul class="user-list" id="userList"></ul>
        </div>
    </div>



    <script src="/socket.io/socket.io.js"></script>
    <script type="module" src="/js/main.js"></script>
</body>

</html>
